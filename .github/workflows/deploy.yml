name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/edutracker-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/edutracker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/edutracker-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/edutracker-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Nginx Image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/edutracker-nginx:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/edutracker-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH Private Key
        run: |
          mkdir -p terraform
          echo "${{ secrets.EC2_SSH_KEY }}" > terraform/devops-key.pem
          chmod 600 terraform/devops-key.pem

      - name: Update inventory IP placeholder
        run: |
          sed -i "s/YOUR_EC2_PUBLIC_IP/${{ secrets.EC2_PUBLIC_IP }}/g" ansible/inventory.ini

      - name: Run Ansible Playbook to Deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
            --extra-vars "docker_hub_user=${{ secrets.DOCKER_HUB_USERNAME }} docker_hub_token=${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} DOCKER_HUB_USER=${{ secrets.DOCKER_HUB_USERNAME }}"
